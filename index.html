<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- App Title -->
    <title>Sri Sai PG Manager</title>
    <meta name="description" content="Food and rent management for Sri Sai PG" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#FFD700" />
    
    <!-- App Icons -->
    <link rel="icon" type="image/jpeg" href="/pg-logo.jpg" />
    <link rel="apple-touch-icon" href="/pg-logo.jpg" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sri Sai PG" />
    
    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('PWA ServiceWorker registered successfully:', reg.scope);
              
              // Handle update checking
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                if (installingWorker) {
                  installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed') {
                      if (navigator.serviceWorker.controller) {
                        console.log('New update detected. Force-activating service worker...');
                        installingWorker.postMessage({ type: 'SKIP_WAITING' });
                      }
                    }
                  };
                }
              };
            })
            .catch(err => console.warn('PWA ServiceWorker registration failed:', err));
        });

        // Listen for controller changes to automatically refresh the page
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      }
    </script>
  </body>
</html>
